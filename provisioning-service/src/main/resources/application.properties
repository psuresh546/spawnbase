# ?????????????????????????????????????????
# APPLICATION
# ?????????????????????????????????????????
spring.application.name=provisioning-service
server.port=8083

# ?????????????????????????????????????????
# DOCKER
# ?????????????????????????????????????????
docker.host=http://localhost:2375

# ?????????????????????????????????????????
# DOWNSTREAM SERVICE URLS
# Docker Compose overrides these via env vars
# ?????????????????????????????????????????
metadata.service.url=${METADATA_SERVICE_URL:http://localhost:8081}
credential.service.url=${CREDENTIAL_SERVICE_URL:http://localhost:8084}

# ?????????????????????????????????????????
# DRIFT DETECTOR
# ?????????????????????????????????????????
drift.detector.interval.ms=60000
drift.detector.initial.delay.ms=30000

# ?????????????????????????????????????????
# ACTUATOR
# ?????????????????????????????????????????
management.endpoints.web.exposure.include=health,info